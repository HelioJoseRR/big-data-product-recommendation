services:
  spark-master:
    build: .
    working_dir: /app
    command:
      - /usr/local/lib/python3.11/site-packages/pyspark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - 0.0.0.0
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - .:/app

  spark-worker-1:
    build: .
    working_dir: /app
    command:
      - /usr/local/lib/python3.11/site-packages/pyspark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --cores
      - "2"
      - --memory
      - 3g
      - --webui-port
      - "8081"
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - .:/app

  spark-worker-2:
    build: .
    working_dir: /app
    command:
      - /usr/local/lib/python3.11/site-packages/pyspark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --cores
      - "2"
      - --memory
      - 3g
      - --webui-port
      - "8082"
    depends_on:
      - spark-master
    ports:
      - "8082:8082"
    volumes:
      - .:/app

  spark-history:
    build: .
    working_dir: /app
    command:
      - /usr/local/lib/python3.11/site-packages/pyspark/bin/spark-class
      - org.apache.spark.deploy.history.HistoryServer
    depends_on:
      - spark-master
    environment:
      SPARK_HISTORY_OPTS: -Dspark.history.fs.logDirectory=file:/app/data/interim/spark-events -Dspark.history.ui.port=18080
    ports:
      - "18080:18080"
    volumes:
      - .:/app

  app:
    build: .
    working_dir: /app
    command: python -m retailrocket_recsys.cli --help
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2
    environment:
      PYTHONPATH: /app/src
      SPARK_LOCAL_IP: app
    ports:
      - "4040:4040"
    volumes:
      - .:/app
